{% set name = "pyspartn" %}
{% set version = "1.0.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyspartn-{{ version }}.tar.gz
  sha256: 44db0f366b004e5a8971b1cd64896a5d701cf4e4b6111c3b06141709010c692d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=75.0.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
test:
  imports:
    - pyspartn
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/semuconsulting/pyspartn
  description: Python library for parsing SPARTN GNSS protocol messages.
  summary: SPARTN protocol parser
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: https://www.semuconsulting.com/pyspartn
  dev_url: https://github.com/semuconsulting/pyspartn

extra:
  recipe-maintainers:
    - semuadmin
